<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto — BLYXU</title>
    <link rel="stylesheet" href="blyxu-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

    <div class="bg-animation"></div>
    <canvas id="particles-canvas"></canvas>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="Logo2.png" alt="BLYXU">
                <span class="nav-logo-text">BLYXU</span>
            </a>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="index.html#coleccion">Catálogo</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
                <li><a href="administrativo.html">Administrativo</a></li>
            </ul>

            <div class="nav-actions">
                <button class="nav-icon-btn" id="cart-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== PRODUCT DETAIL ===== -->
    <main class="product-detail-container" id="product-detail">
        <div class="product-gallery">
            <div class="product-main-img" id="detail-img-container">
                <img src="" alt="" id="detail-img" style="transition: opacity 0.2s ease-in-out;">
            </div>
            <div class="product-thumbnails" id="detail-thumbnails" style="display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px;"></div>
        </div>

        <div class="product-info">
            <div class="product-info-cat" id="detail-cat">Categoría</div>
            <h1 class="product-info-name" id="detail-name">Nombre del Producto</h1>
            
            <div class="product-info-price">
                <span id="detail-price">$0</span>
                <span class="old" id="detail-old-price" style="display:none;">$0</span>
            </div>

            <p class="product-info-desc" id="detail-desc">
                Cargando detalles del producto...
            </p>

            <div id="product-variations" style="display: none; margin-bottom: 24px;"></div>

            <div class="product-specs">
                <div class="spec-item">
                    <span class="spec-label">Disponibilidad</span>
                    <span class="spec-value" id="detail-stock">En Stock</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label">Colores</span>
                    <span class="spec-value" id="detail-colors">Varios</span>
                </div>
                <div class="spec-item" id="spec-sku-row" style="display: none;">
                    <span class="spec-label">SKU / Ref</span>
                    <span class="spec-value" id="detail-sku"></span>
                </div>
                <div class="spec-item" id="spec-size-row" style="display: none;">
                    <span class="spec-label">Tamaño</span>
                    <span class="spec-value" id="detail-size"></span>
                </div>
                <div class="spec-item" id="spec-style-row" style="display: none;">
                    <span class="spec-label">Estilo</span>
                    <span class="spec-value" id="detail-style"></span>
                </div>
            </div>

            <div class="product-info-actions">
                <button class="btn-buy-now" id="btn-add-to-cart-detail">Añadir al Carrito</button>
            </div>
        </div>
    </main>

    <!-- ===== RECOMMENDED PRODUCTS ===== -->
    <section class="recommended-section">
        <div class="section-header" style="margin-bottom: 40px;">
            <h2 class="section-title">Productos <span class="gradient">Recomendados</span></h2>
        </div>
        <div class="products-grid" id="products-grid">
            <!-- Cargado por JS -->
        </div>
    </section>

    <!-- ===== CART SIDEBAR (Shared) ===== -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Tu Carrito</h3>
            <button class="cart-close" id="cart-close">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total</span>
                <span id="cart-total">$0</span>
            </div>
            <button class="btn-checkout" id="btn-checkout">Finalizar Compra vía WhatsApp</button>
        </div>
    </div>

    <script src="blyxu-app.js"></script>
    <script>
        // Lógica específica para la página de producto
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = Number.parseInt(urlParams.get('id'), 10);
            const detailCatalogMode = urlParams.get('catalogo') === 'mayorista' ? 'wholesale' : 'retail';
            const detailShowsPrices = detailCatalogMode === 'wholesale' || localStorage.getItem('blyxu_show_retail_prices') !== '0';
            activeCatalogMode = detailCatalogMode;

            // Esperar a que los productos carguen en blyxu-app.js
            // Como loadProducts es asíncrona, necesitamos asegurarnos de que terminó
            if (allProducts.length === 0) {
                await loadProducts({ renderCatalog: false });
            }

            const product = allProducts[productId];
            if (!Number.isInteger(productId) || !product) {
                document.getElementById('product-detail').innerHTML = `
                    <div class="product-not-found">
                        <h2>Producto no encontrado</h2>
                        <a href="index.html#coleccion" class="main-banner-btn">Volver al catálogo</a>
                    </div>
                `;
                return;
            }

            // Rellenar datos
            const name = product.Nombre || product.nombre || product.Producto || 'Producto';
            const price = getProductPrice(product, detailCatalogMode);
            const oldPrice = parseFloat(product.Precio_Anterior || 0);
            const img = normalizeImageUrl(product.Imagen || product.imagen || (product.Galeria && product.Galeria[0]) || '');
            const cat = product.Categoria || product.categoria || '';
            const desc = product.Descripcion || product.descripcion || 'Sin descripción disponible.';
            const stock = parseInt(product.Stock || product.stock || 0);
            const colors = product.Color || product.color || 'Único';
            const sku = product.SKU || product.idVariacion || '';
            const size = product.Tamano || product.tamano || '';
            const style = product.Estilo || product.estilo || '';

            document.getElementById('detail-name').textContent = name;
            document.getElementById('detail-cat').textContent = detailCatalogMode === 'wholesale' ? `Mayorista · ${cat}` : cat;
            document.getElementById('detail-price').textContent = detailShowsPrices ? formatMoney(price) : 'Precio por consultar';
            document.getElementById('detail-desc').textContent = desc;
            document.getElementById('detail-stock').textContent = stock > 0 ? `${stock} unidades disponibles` : 'Agotado';
            document.getElementById('detail-colors').textContent = colors;

            if (sku) {
                document.getElementById('detail-sku').textContent = sku;
                document.getElementById('spec-sku-row').style.display = 'flex';
            }
            if (size) {
                document.getElementById('detail-size').textContent = size;
                document.getElementById('spec-size-row').style.display = 'flex';
            }
            if (style) {
                document.getElementById('detail-style').textContent = style;
                document.getElementById('spec-style-row').style.display = 'flex';
            }

            // Variaciones (Mismo idProducto)
            const parentId = product.idProducto;
            const siblings = parentId ? allProducts.filter(p => p.idProducto === parentId && String(p.Categoria || p.categoria || '').toLowerCase() !== 'banner') : [];
            
            if (siblings.length > 1) {
                const varContainer = document.getElementById('product-variations');
                let html = '<h3 style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Variantes Disponibles</h3><div style="display: flex; gap: 8px; flex-wrap: wrap;">';
                
                siblings.forEach((sib, index) => {
                    const sibIndex = allProducts.indexOf(sib);
                    const isActive = sibIndex === productId;
                    
                    let labelParts = [];
                    if (sib.Color) labelParts.push(sib.Color);
                    if (sib.Tamano || sib.tamano) labelParts.push(sib.Tamano || sib.tamano);
                    if (sib.Estilo || sib.estilo) labelParts.push(sib.Estilo || sib.estilo);
                    
                    let label = labelParts.join(' - ');
                    if (!label) {
                        label = sib.idVariacion || `Opción ${index + 1}`;
                    }

                    html += `<button onclick="window.location.href='producto.html?id=${sibIndex}${detailCatalogMode==='wholesale'?'&catalogo=mayorista':''}'" 
                                style="padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1px solid ${isActive ? 'var(--primary)' : 'rgba(255,255,255,0.1)'}; background: ${isActive ? 'rgba(155,44,250,0.1)' : 'rgba(255,255,255,0.03)'}; color: ${isActive ? '#fff' : 'var(--text-muted)'}; cursor: pointer; transition: all 0.2s;"
                                onmouseover="this.style.borderColor='var(--primary)'; this.style.color='#fff';"
                                onmouseout="if(!${isActive}){ this.style.borderColor='rgba(255,255,255,0.1)'; this.style.color='var(--text-muted)'; }">
                                ${escapeHtml(label)}
                             </button>`;
                });
                html += '</div>';
                
                varContainer.innerHTML = html;
                varContainer.style.display = 'block';
            }

            const detailImg = document.getElementById('detail-img');
            detailImg.alt = name;
            detailImg.onerror = () => {
                detailImg.onerror = null;
                detailImg.src = 'Logo2.png';
                document.getElementById('detail-img-container').classList.add('is-fallback');
            };
            detailImg.src = img || 'Logo2.png';

            // Generar galería de miniaturas si el producto tiene más imágenes
            const allImages = getProductImageSet(product);
            const thumbsContainer = document.getElementById('detail-thumbnails');
            if (allImages.length > 1) {
                thumbsContainer.innerHTML = allImages.map(imgUrl => `
                    <img src="${escapeHtml(imgUrl)}" 
                         class="gallery-thumb" 
                         style="width: 70px; height: 70px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; flex-shrink: 0;"
                         onclick="
                             const mainImg = document.getElementById('detail-img');
                             if(mainImg.src === '${escapeHtml(imgUrl)}') return;
                             mainImg.style.opacity = 0;
                             setTimeout(() => {
                                 mainImg.src='${escapeHtml(imgUrl)}';
                                 mainImg.onload = () => mainImg.style.opacity = 1;
                             }, 150);
                             document.querySelectorAll('.gallery-thumb').forEach(t=>t.style.borderColor='transparent'); 
                             this.style.borderColor='var(--primary)';
                         "
                         onerror="this.style.display='none'">
                `).join('');
                const firstThumb = thumbsContainer.querySelector('.gallery-thumb');
                if (firstThumb) firstThumb.style.borderColor = 'var(--primary)';
                thumbsContainer.style.display = 'flex';
            } else {
                if (thumbsContainer) thumbsContainer.style.display = 'none';
            }

            if (detailShowsPrices && oldPrice > price) {
                const oldEl = document.getElementById('detail-old-price');
                oldEl.textContent = formatMoney(oldPrice);
                oldEl.style.display = 'inline';
            }

            const detailCartBtn = document.getElementById('btn-add-to-cart-detail');
            detailCartBtn.disabled = stock <= 0 || !detailShowsPrices;
            detailCartBtn.textContent = !detailShowsPrices ? 'Precio por consultar' : (stock > 0 ? 'Añadir al Carrito' : 'Producto Agotado');
            detailCartBtn.onclick = () => {
                if (stock <= 0 || !detailShowsPrices) return;
                addToCart(productId, null, detailCatalogMode);
            };

            // Renderizar recomendados (otros productos de la misma categoría o aleatorios)
            const normalizedCat = cat.toLowerCase();
            const recommendationSource = getCurrentCatalogProducts();
            const sameCategory = recommendationSource.filter(p =>
                allProducts.indexOf(p) !== productId && (p.Categoria || p.categoria || '').toLowerCase() === normalizedCat
            );
            const otherProducts = recommendationSource.filter(p =>
                allProducts.indexOf(p) !== productId && (p.Categoria || p.categoria || '').toLowerCase() !== normalizedCat
            );
            const recommended = [...sameCategory, ...otherProducts].slice(0, 4);
            
            renderProducts(recommended, { featuredFirst: false, mode: detailCatalogMode });
            
            // Actualizar título de la página
            document.title = `${name} — BLYXU`;
        });
    </script>
</body>
</html>
